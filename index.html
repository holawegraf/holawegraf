<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WeGraf | Diseño & Gráfica</title>

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; font-family: "Poppins", sans-serif; }

    body {
      position: relative;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: #222;
      background: <img src="background.jpg">;
      background-size: cover;
      overflow: hidden;
      padding: 2rem;
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(8px);
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 20px;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.15);
      padding: 3rem;
      max-width: 700px;
      width: 100%;
      animation: fadeIn 1.2s ease-in-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .logo {
      width: 140px;
      height: 140px;
      margin: 0 auto 1rem;
    }

    p {
      font-size: 1.1rem;
      color: #444;
      line-height: 1.6;
      margin-bottom: 2rem;
    }

    .btn-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.6rem;
      padding: 0.9rem 1.8rem;
      border-radius: 50px;
      font-weight: 600;
      text-decoration: none;
      color: #fff;
      transition: transform 0.2s ease, background 0.3s ease;
    }

    .btn:hover { transform: scale(1.05); }

    .whatsapp-btn {
      background-color: #25d366;
    }

    .whatsapp-btn:hover {
      background-color: #1eb45c;
    }

    /* BOTÓN YOUTUBE ROJO */
    .youtube-btn {
      background-color: #ff0000;
    }

    .youtube-btn:hover {
      background-color: #cc0000;
    }

    .social {
      display: flex;
      justify-content: center;
      gap: 1.2rem;
      margin-top: 2rem;
    }

    .social a {
      text-decoration: none;
      font-size: 1.6rem;
      color: #555;
      transition: color 0.3s, transform 0.2s;
    }

    .social a:hover {
      color: #000;
      transform: scale(1.2);
    }

    /* CARRUSEL */
    .carousel {
      margin-top: 2rem;
      overflow: hidden;
      width: 100%;
      border-radius: 15px;
    }

    .carousel-track {
      display: flex;
      gap: 2.2rem;
      animation: scroll 30s linear infinite;
      justify-content: center;
      align-items: center;
    }

    .carousel-item {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      font-size: 2.4rem;
      animation: bounce 2.5s infinite ease-in-out;
    }

    .carousel-item span {
      font-size: 0.9rem;
      margin-top: 0.4rem;
      color: #555;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    @keyframes scroll {
      0% { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    footer {
      margin-top: 3rem;
      font-size: 0.9rem;
      color: #777;
    }

    @media (prefers-color-scheme: dark) {
      body::before { background: rgba(0, 0, 0, 0.7); }
      .container { background: rgba(25,25,25,0.9); }
      p, .carousel-item span, footer { color: #ccc; }
      .social a { color: #ccc; }
      .social a:hover { color: #fff; }
    }

    @media (max-width: 600px) {
      .container { padding: 2rem; }
      p { font-size: 1rem; }
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- LOGO -->
    <div class="logo">
      <img src="logo.png" alt="Logo WeGraf" style="width:100%; height:100%; object-fit:contain;">
    </div>

    <p>
      En <strong>WeGraf</strong> diseñamos y producimos soluciones gráficas para marcas y emprendedores.
      Vinilos, identidad visual, merchandising, impresiones y diseño profesional.
    </p>

    <div class="btn-group">
      <a class="btn whatsapp-btn" href="https://wa.me/5491173692091" target="_blank">
        <i class="fa-brands fa-whatsapp"></i> Contactanos por WhatsApp
      </a>

      <a class="btn youtube-btn" href="https://www.youtube.com/shorts/43ZlRnIto8I" target="_blank">
        <i class="fa-brands fa-youtube"></i> Ver video
      </a>
    </div>

    <div class="social">
      <a href="#" target="_blank"><i class="fa-brands fa-instagram"></i></a>
      <a href="#" target="_blank"><i class="fa-brands fa-behance"></i></a>
      <a href="#" target="_blank"><i class="fa-brands fa-facebook"></i></a>
    </div>

    <!-- CARRUSEL -->
    <div class="carousel">
      <div class="carousel-track">
        <div class="carousel-item"><i class="fa-solid fa-pen-nib"></i><span>Diseño</span></div>
        <div class="carousel-item"><i class="fa-solid fa-note-sticky"></i><span>Vinilos</span></div>
        <div class="carousel-item"><i class="fa-solid fa-print"></i><span>Impresión</span></div>
        <div class="carousel-item"><i class="fa-solid fa-shirt"></i><span>Merchandising</span></div>
        <div class="carousel-item"><i class="fa-solid fa-palette"></i><span>Branding</span></div>
        <div class="carousel-item"><i class="fa-solid fa-pen-nib"></i><span>Diseño</span></div>
      </div>
    </div>

    <footer>© 2026 WeGraf · Diseño & Gráfica</footer>

  </div>

</body>
</html>
